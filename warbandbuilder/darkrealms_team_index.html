<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dark Realms — Team Builder</title>
<style>
  :root{
    --bg:#0b0f14; --panel:linear-gradient(180deg, rgba(50,105,122,1), rgba(28,63,74,.5)); --panel2:#3D3D3D;--panel3: linear-gradient(180deg, rgba(0,133,123,1), rgba(0,0,0,1));
      border-color: rgba(0,179,166,.45);;
    --text:#e9f0ff;--text2:#fff; --muted:#E3E3E3;

    /* NEW border color */
    --line:#54968F;

    --accent:#42d3ff; --danger:#ff5c73; --ok:#66ffb3;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;background:#1D2024;color:var(--text)}

  /* NEW: match builders */
  .wrap{max-width:960px;margin:0 auto;padding:18px}

  .topbar{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:10px}
  .headerLogo{width:100%;display:flex;justify-content:center;align-items:center}
  .headerLogo img{width:499px;height:150px;max-width:100%;object-fit:contain;display:block}

  .controls{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
}
button,.btn{
  background:var(--panel3);
  color:var(--text2);
  border:1px solid var(--line);
  border-radius:15px;
  padding:7px 9px;
  cursor:pointer;
  font-weight:500;
  font-size:12px;
}

  button.danger{
    background:linear-gradient(180deg, rgba(140,48,62,1), rgba(0,0,0,1)); color:var(--text2);
    border:1px solid; Border-color:#000000; border-radius:15px;
    padding:7px 9px; cursor:pointer; font-weight:500;
    font-size: 12px;
  }
  button:hover{background: #7DB6B8}
  button.danger:hover{filter:brightness(1.06)}
  button.accent{border-color:var(--line)}
  button.accent:hover{filter:brightness(1.06)}
  input[type="file"]{display:none}

  .pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:10px 12px;
  border-radius:999px;
  border:1px solid var(--line);
  background:rgba(17,24,35,.7);
  color:var(--text);
  font-weight:700;
  font-size:0.85rem;
  cursor:pointer;
}
  .pill:hover{filter:brightness(1.06)}

  button.pill.export-pill{
  background:rgba(17,24,35,.7);
  color:var(--text);
  border:1px solid var(--line);
  border-radius:999px;
  padding:10px 12px;
  font-weight:500;
  font-size:0.85rem;
}

button.pill.export-pill:hover{
  filter:brightness(1.06);
  background:rgba(17,24,35,.7);
}
  .controls > button,
.controls > .pill{
  font-size:0.85rem;
}
.controls > .pill{
  font-weight:500;
}
.controls > button:not(.danger){
  white-space:nowrap;
}
  .statsRow{display:grid;grid-template-columns:1fr;gap:10px;margin:10px 0 14px}
  @media (min-width:900px){
    .statsRow{grid-template-columns:repeat(auto-fit, minmax(220px, 1fr))}
  }
  .statCard{
    background:var(--panel); border:1px solid var(--line);
    border-radius:14px; padding:12px 14px; min-height:92px;
  }
  .statCard .label{color:var(--muted);font-size:12px}
  .statCard .value{font-size:22px;font-weight:900;margin-top:4px}
  .statCard .notice{color:var(--muted);font-size:12px;line-height:1.35;margin-top:6px}

  .rowInline{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:8px}
  .field, select{
    background:#0E2226;
    border:1px solid var(--line);
    border-radius:10px;
    padding:8px 10px;
    color:var(--text);
    font-weight:800;
    outline:none;
  }
  select option{color:#0b0f14}
  .field{width:110px}
  .smallField{width:90px}

.stepBtn{
  width:40px;
  height:40px;
  border-radius:10px;
  padding:0;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  line-height:1;
}

  .grid{display:grid;grid-template-columns:1fr;gap:10px}
  @media (min-width:900px){
    .grid{grid-template-columns:1fr 1fr}
  }

  .fighter{
    background:rgba(17,24,35,.8);
    border:1px solid var(--line);
    border-radius:16px; overflow:hidden;
  }
  .fighterHead{
    display:flex;align-items:flex-start;justify-content:space-between;
    gap:10px;padding:12px 14px;background:linear-gradient(180deg, rgba(224,221,213,1), rgba(158,156,152,1));
  }
  .fighterHead .left{
    display:flex;
    flex-direction:column;
    gap:2px;
    min-width:0;
    flex:1 1 auto;
  }
  .fighterHead .name{
    color:#000000;
    font-weight:900;
    font-size:15px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:100%;
  }
  .fighterHead .meta{
    color:#000000;
    font-size:12px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:100%;
  }
  .fighterHead .right{
    display:flex;
    flex-direction:column;
    gap:6px;
    align-items:flex-end;
    flex:0 0 auto;
    min-width:max-content;
  }
  .fighterActionsRow{
    display:flex;
    gap:8px;
    align-items:center;
    justify-content:flex-end;
    flex-wrap:nowrap;
  }
  .fighterActionsRow > *{
    flex:0 0 auto;
  }

  .costTag{
    font-weight:900;
    border:1px solid var(--line);
    padding:6px 10px;
    border-radius:999px;
    background:#fff;
    color:#000000
  }

  details{border-top:1px solid var(--line)}
  details summary{list-style:none;cursor:pointer;padding:10px 14px;color:var(--muted);user-select:none}
  details summary::-webkit-details-marker{display:none}

  .body{padding:12px 14px;display:grid;gap:10px}
  .section{
    background:rgba(17,24,35,.55);
    border:1px solid var(--line);
    border-radius:14px;
    padding:10px 12px
  }
  .section h3{margin:0 0 6px;font-size:12px;letter-spacing:.4px;color:var(--muted);text-transform:uppercase}

  .row{display:flex;justify-content:space-between;gap:12px;padding:6px 0;border-bottom:1px dashed rgba(0,115,107,.55)}
  .row:last-child{border-bottom:none}
  .row .l{min-width:0}
  .row .l b{font-weight:900}
  .row .l .small{color:var(--muted);font-size:12px;margin-top:2px;line-height:1.25}
  .row .r{white-space:nowrap;font-weight:900}

  .kvs{display:flex;gap:10px;flex-wrap:wrap}
  .kv{
    border:1px solid var(--line);
    border-radius:12px;
    padding:8px 10px;
    background:rgba(17,24,35,.35)
  }
  .kv .k{color:var(--muted);font-size:11px}
  .kv .v{font-size:14px;font-weight:900;margin-top:2px}

  .muted{color:var(--muted)}
  .notice{color:var(--muted);font-size:12px;line-height:1.35;margin-top:6px}
  .error{color:var(--danger);font-weight:800}
  .ok{color:var(--ok);font-weight:900}

  .toggle{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px}
  .toggle input{transform:scale(1.1)}

  /* Normalize ALL top control pills (buttons + labels) */
.controls > .pill,
.controls > button.pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;

  height:36px;              /* ← equal height */
  padding:0 12px;           /* ← removes label vs button difference */

  border-radius:999px;
  border:1px solid var(--line);
  background:rgba(17,24,35,.7);

  font-size:0.85rem;
  font-weight:00;          /* ← removes bold difference */

  line-height:1;            /* ← prevents vertical mismatch */
}

/* Keep hover consistent */
.controls > .pill:hover,
.controls > button.pill:hover{
  filter:brightness(1.06);
}
</style>
</head>

           <div class="headerLogo">

        <div class="notice" id="limitNotice"></div>

  <div class="rowInline" style="margin-top:10px">
    <input id="limitInput" class="field" type="number" min="0" step="1" value="375" title="0 disables limit"/>

</div>

    <div id="status" class="notice"></div>

  const teamInput = el("teamInput");

  // ---- Roster <-> Fighter Builder bridge (localStorage) ----
  const TEAM_KEY = "dr_roster_team_state_v1";
  const EDIT_KEY = "dr_roster_edit_ctx_v1";

  // Change this filename to match where you place the Fighter Builder.
  const FIGHTER_BUILDER_URL = "darkrealms_fighter_builder.html";

  // ---- IndexedDB Portrait Store (avoids localStorage quota) ----
  const PORTRAIT_DB_NAME = "warband_portraits_v1";
  const PORTRAIT_STORE   = "portraits";

  function openPortraitDB(){
    return new Promise((resolve, reject) => {
      try{
        const req = indexedDB.open(PORTRAIT_DB_NAME, 1);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(PORTRAIT_STORE)) db.createObjectStore(PORTRAIT_STORE);
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      }catch(err){ reject(err); }
    });
  }
  async function portraitDBSet(key, dataUrl){
    if (!key) return;
    const db = await openPortraitDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(PORTRAIT_STORE, "readwrite");
      tx.objectStore(PORTRAIT_STORE).put(String(dataUrl || ""), String(key));
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  }
  async function portraitDBGet(key){
    if (!key) return "";
    const db = await openPortraitDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(PORTRAIT_STORE, "readonly");
      const req = tx.objectStore(PORTRAIT_STORE).get(String(key));
      req.onsuccess = () => resolve(String(req.result || ""));
      req.onerror = () => reject(req.error);
    });
  }

  async function ensurePortraitStoredOnFighter(fighter, fallbackKey){
    try{
      if (!fighter || typeof fighter !== "object") return;
      const dataUrl = (typeof fighter.portraitDataUrl === "string") ? fighter.portraitDataUrl.trim() : "";
      if (!dataUrl) return;
      const key = (fighter.portraitKey && String(fighter.portraitKey).trim()) ? String(fighter.portraitKey).trim() : String(fallbackKey || "");
      const finalKey = key || ("p_" + Math.random().toString(16).slice(2) + "_" + Date.now().toString(16));
      await portraitDBSet(finalKey, dataUrl);
      fighter.portraitKey = finalKey;
      fighter.portraitDataUrl = ""; // keep roster lean
    }catch(_){}
  }

  async function attachPortraitForExport(fighter){
    try{
      if (!fighter || typeof fighter !== "object") return;
      const has = (typeof fighter.portraitDataUrl === "string") ? fighter.portraitDataUrl.trim() : "";
      if (has) return;
      const key = (fighter.portraitKey && String(fighter.portraitKey).trim()) ? String(fighter.portraitKey).trim() : "";
      if (!key) return;
      const dataUrl = await portraitDBGet(key);
      if (dataUrl) fighter.portraitDataUrl = dataUrl;
    }catch(_){}
  }


    function saveTeamStateToBrowser(){
    // Store a lean team state in localStorage (no portrait bytes).
    // Portraits live in IndexedDB under fighter.portraitKey.
    function buildPayload(){
      return {
        version: 1,
        savedAt: new Date().toISOString(),
        warbandName: (warbandNameEl?.value || "").trim(),
        limit: safeNumber(limitInput.value),
        team: team.map(entry=>{
          const cloned = JSON.parse(JSON.stringify(entry));
          if (cloned?.data?.fighter){
            cloned.data.fighter.portraitDataUrl = "";
          }
          return cloned;
        })
      };
    }
    try{
      localStorage.setItem(TEAM_KEY, JSON.stringify(buildPayload()));
    }catch(e){
      // If even a lean payload fails (should be rare), do nothing rather than corrupting state.
    }
  }

  function loadTeamStateFromBrowser(){
    try{
      const raw = localStorage.getItem(TEAM_KEY);
      if (!raw) return false;
      const obj = JSON.parse(raw);
      if (!obj || typeof obj !== "object" || !Array.isArray(obj.team)) return false;

      // restore team
      team = obj.team.map(normalizeTeamEntry);

      // restore warband name / limit
      if (typeof obj.warbandName === "string" && warbandNameEl){
        warbandNameEl.value = obj.warbandName;
        saveWarbandName(obj.warbandName);
      }
      if (typeof obj.limit === "number") limitInput.value = String(Math.max(0, obj.limit));
      return true;
    }catch(e){
      return false;
    }
  }

  async function migrateExistingPortraitsToIndexedDB(){
    // If an older version stored portraitDataUrl inside roster entries, move them into IndexedDB once.
    try{
      for (const entry of (team || [])){
        await ensurePortraitStoredOnFighter(entry?.data?.fighter, entry?.id);
      }
    }catch(_){}
  }

  function getReturnUrl(){
    // Keep it simple: return to the current file without query/hash.
    const href = (window.location && window.location.href) ? window.location.href : "";
    return href.replace(/[#?].*$/, "");
  }

  function startEditFighter(entryId, options = {}){
    try{
      // persist current roster first
      saveTeamStateToBrowser();

      const ctx = {
        version: 1,
        mode: entryId ? "edit" : "new",
        entryId: entryId || null,
        returnUrl: getReturnUrl(),
        autoCard: !!options.autoCard,
        startedAt: new Date().toISOString()
      };
      localStorage.setItem(EDIT_KEY, JSON.stringify(ctx));
    }catch(e){}

    // navigate to fighter builder
    window.location.href = FIGHTER_BUILDER_URL + (options.autoCard ? '?autocard=1' : '');
  }


  function uid() {
    return "f_" + Math.random().toString(16).slice(2) + "_" + Date.now().toString(16);
  }
  function safeNumber(n) {
    return Number.isFinite(+n) ? +n : 0;
  }
  function fmtPts(n) {
    return `${safeNumber(n)} pts`;
  }
  function escapeHtml(s) {
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }


  // ---- Warband Name ----
  function loadWarbandName() {
    try { return localStorage.getItem(WARBAND_KEY) || ""; }
    catch { return ""; }
  }
  function saveWarbandName(name) {
    try { localStorage.setItem(WARBAND_KEY, String(name || "")); }
    catch {}
  }

  // ---- Fighter calculations & rendering ----
  function calcFighterTotal(f) {
    const p = f?.points;
    if (!p || typeof p !== "object") return 0;
    return Object.values(p).reduce((sum, v) => sum + safeNumber(v), 0);
  }
  function teamTotal() {
    return team.reduce((sum, entry) => sum + calcFighterTotal(entry.data.fighter), 0);
  }

  function detectGameApp(obj) {
    const app = (obj?.app || "").toLowerCase();
    if (app.includes("mortalis")) return "Mortalis";
    if (app.includes("dark realms")) return "Dark Realms";
    return obj?.app ? String(obj.app) : "Unknown";
  }

  function validateFighterJson(obj) {
    if (!obj || typeof obj !== "object") return "Not an object.";
    if (!obj.fighter || typeof obj.fighter !== "object") return "Missing 'fighter' object.";
    if (typeof obj.fighter.name !== "string") return "Missing fighter.name.";
    if (!obj.fighter.stats || typeof obj.fighter.stats !== "object") return "Missing fighter.stats.";
    if (!obj.fighter.points || typeof obj.fighter.points !== "object") return "Missing fighter.points breakdown.";
    return null;

  function getDisplayName(it) {
    const override = (it?.displayNameOverride != null) ? String(it.displayNameOverride).trim() : "";
    return override || String(it?.name ?? "Unnamed");
  }

  function normText(v) {
    return String(v == null ? "" : v).trim().toLowerCase();
  }

  function normalizeUpgrades(upgrades) {
    return {
      poison: !!(upgrades && upgrades.poison),
      enchanted: !!(upgrades && upgrades.enchanted),
      cursed: !!(upgrades && upgrades.cursed),
      truestrike: !!(upgrades && upgrades.truestrike),
      masterCrafted: !!(upgrades && upgrades.masterCrafted)
    };
  }

  function weaponUpgradeCost(w) {
    const ups = normalizeUpgrades(w?.upgrades);
    const count = [ups.poison, ups.enchanted, ups.cursed, ups.truestrike, ups.masterCrafted].filter(Boolean).length;
    return count ? (2 + (count - 1) * 4) : 0;
  }

  function findCanonical(imported, srcArray, mode) {
    if (!imported || !Array.isArray(srcArray)) return null;
    if (imported.id) {
      const byId = srcArray.find(src => src && src.id === imported.id);
      if (byId) return byId;
    }

    const names = [imported.name, imported.displayNameOverride, imported.baseName].filter(v => v != null);
    for (const name of names) {
      const want = normText(name);
      if (!want) continue;
      const byName = srcArray.find(src => normText(src?.name) === want);
      if (byName) return byName;
    }

    if (mode === "weapon") {
      const wantProfile = normText(imported.baseProfile != null ? imported.baseProfile : imported.profile);
      if (wantProfile) {
        const byProfile = srcArray.find(src => normText(src?.profile) === wantProfile);
        if (byProfile) return byProfile;
      }
    } else {
      const wantEffect = normText(imported.effect != null ? imported.effect : imported.profile);
      const wantCv = (imported.cv != null) ? Number(imported.cv) : null;
      if (wantEffect || wantCv != null) {
        const byEffect = srcArray.find(src => {
          const srcEffect = normText(src && (src.effect != null ? src.effect : src.profile));
          const srcCv = (src && src.cv != null) ? Number(src.cv) : null;
          return (wantEffect && srcEffect === wantEffect) || (wantCv != null && srcCv === wantCv);
        });
        if (byEffect) return byEffect;
      }
    }

    return null;
  }

  function carryDisplayName(target, imported, canonicalName) {
    if (!target || !imported) return;
    const explicit = (imported.displayNameOverride != null) ? String(imported.displayNameOverride).trim() : "";
    if (explicit) {
      target.displayNameOverride = explicit;
      return;
    }
    const importedName = (imported.name != null) ? String(imported.name).trim() : "";
    if (importedName && normText(importedName) !== normText(canonicalName)) {
      target.displayNameOverride = importedName;
    }
  }

  function normalizeWeapon(imported, srcArray) {
    imported = imported || {};
    const canonical = findCanonical(imported, srcArray, "weapon");
    if (canonical) {
      const out = {
        id: canonical.id,
        name: canonical.name,
        baseProfile: canonical.profile,
        profile: canonical.profile,
        basePoints: safeNumber(canonical.points),
        points: safeNumber(canonical.points),
        upgrades: normalizeUpgrades(imported.upgrades)
      };
      carryDisplayName(out, imported, canonical.name);
      return out;
    }
    const fallbackBase = imported.basePoints != null ? safeNumber(imported.basePoints) : safeNumber(imported.points);
    return {
      id: imported.id,
      name: String(imported.name ?? "Unnamed"),
      baseProfile: imported.baseProfile ?? imported.profile ?? "",
      profile: imported.baseProfile ?? imported.profile ?? "",
      basePoints: fallbackBase,
      points: fallbackBase,
      upgrades: normalizeUpgrades(imported.upgrades),
      displayNameOverride: imported.displayNameOverride
    };
  }

  function normalizeSimple(imported, srcArray) {
    imported = imported || {};
    const canonical = findCanonical(imported, srcArray, "simple");
    if (canonical) {
      const out = {
        id: canonical.id,
        name: canonical.name,
        points: (canonical.points != null) ? canonical.points : 0,
        profile: canonical.profile,
        effect: canonical.effect,
        dynamicType: canonical.dynamicType,
        dynamicFactor: canonical.dynamicFactor,
        cv: canonical.cv
      };
      carryDisplayName(out, imported, canonical.name);
      return out;
    }
    return JSON.parse(JSON.stringify({
      id: imported.id,
      name: String(imported.name ?? "Unnamed"),
      points: safeNumber(imported.points),
      profile: imported.profile,
      effect: imported.effect,
      dynamicType: imported.dynamicType,
      dynamicFactor: imported.dynamicFactor,
      cv: imported.cv,
      displayNameOverride: imported.displayNameOverride
    }));
  }

  function recalcStatsCost(stats) {
    const config = [
      { key: "move",  base: 6, upCost: 4, downCost: 4, lowerIsBetter: false },
      { key: "def",   base: 9, upCost: 1, downCost: 1, lowerIsBetter: true  },
      { key: "ap",    base: 2, upCost: 4, downCost: 4, lowerIsBetter: false },
      { key: "hp",    base: 7, upCost: 1, downCost: 1, lowerIsBetter: false },
      { key: "atk",   base: 3, upCost: 2, downCost: 0, lowerIsBetter: false },
      { key: "fight", base: 7, upCost: 2, downCost: 1, lowerIsBetter: true  },
      { key: "shoot", base: 7, upCost: 2, downCost: 1, lowerIsBetter: true  }
    ];
    let total = 0;
    for (const cfg of config) {
      const value = safeNumber(stats?.[cfg.key]);
      const diff = value - cfg.base;
      if (!diff) continue;
      if (cfg.lowerIsBetter) {
        total += (diff < 0) ? Math.abs(diff) * cfg.upCost : diff * -cfg.downCost;
      } else {
        total += (diff > 0) ? diff * cfg.upCost : Math.abs(diff) * -cfg.downCost;
      }
    }
    return total;
  }

  function normalizeAndRecalcFighter(rawFighter) {
    const incoming = (rawFighter && typeof rawFighter === "object") ? rawFighter : {};
    const fighter = JSON.parse(JSON.stringify(incoming));
    fighter.stats = fighter.stats || {};
    fighter.points = fighter.points || {};
    fighter.points.base = (typeof fighter.points.base === "number") ? fighter.points.base : 16;

    fighter.ccWeapons = Array.isArray(incoming.ccWeapons) ? incoming.ccWeapons.map(w => normalizeWeapon(w, CC_WEAPONS)) : [];
    fighter.rangedWeapons = Array.isArray(incoming.rangedWeapons) ? incoming.rangedWeapons.map(w => normalizeWeapon(w, RANGED_WEAPONS)) : [];
    fighter.abilities = Array.isArray(incoming.abilities) ? incoming.abilities.map(x => normalizeSimple(x, FIGHTER_ABILITIES)) : [];
    fighter.leaderAbilities = Array.isArray(incoming.leaderAbilities) ? incoming.leaderAbilities.map(x => normalizeSimple(x, LEADER_ABILITIES)) : [];
    fighter.spells = Array.isArray(incoming.spells) ? incoming.spells.map(x => normalizeSimple(x, SPELLS)) : [];
    fighter.equipment = Array.isArray(incoming.equipment) ? incoming.equipment.map(x => normalizeSimple(x, EQUIPMENT)) : [];

    fighter.points.stats = recalcStatsCost(fighter.stats);
    const basePlusStats = Math.max(0, safeNumber(fighter.points.base) + safeNumber(fighter.points.stats));
    fighter.points.warlock = fighter.isMasterWarlock ? Math.ceil(basePlusStats * (2/3)) : (fighter.isWarlock ? Math.ceil(basePlusStats * 0.5) : 0);

    fighter.points.ccWeapons = fighter.ccWeapons.reduce((sum, w) => {
      w.points = safeNumber(w.basePoints) + weaponUpgradeCost(w);
      return sum + safeNumber(w.points);
    }, 0);
    fighter.points.rangedWeapons = fighter.rangedWeapons.reduce((sum, w) => {
      w.points = safeNumber(w.basePoints) + weaponUpgradeCost(w);
      return sum + safeNumber(w.points);
    }, 0);

    fighter.points.abilities = fighter.abilities.reduce((sum, it) => {
      if (it.dynamicType === "percentHp") {
        it.points = Math.ceil(safeNumber(fighter.stats.hp) * safeNumber(it.dynamicFactor));
      } else if (it.dynamicType === "hpStat") {
        const factor = (it.dynamicFactor != null) ? safeNumber(it.dynamicFactor) : 1;
        it.points = Math.round(safeNumber(fighter.stats.hp) * factor);
      } else {
        it.points = safeNumber(it.points);
      }
      return sum + safeNumber(it.points);
    }, 0);

    fighter.points.leaderAbilities = fighter.leaderAbilities.reduce((sum, it) => {
      it.points = safeNumber(it.points);
      return sum + safeNumber(it.points);
    }, 0);

    fighter.points.spells = fighter.spells.reduce((sum, it) => {
      it.points = safeNumber(it.points);
      return sum + safeNumber(it.points);
    }, 0);

    fighter.points.equipment = fighter.equipment.reduce((sum, it) => {
      if (it.dynamicType === "percentStats") {
        it.points = Math.ceil(basePlusStats * safeNumber(it.dynamicFactor));
      } else {
        it.points = safeNumber(it.points);
      }
      return sum + safeNumber(it.points);
    }, 0);

    return fighter;
  }

  function normalizeTeamEntry(entry) {
    if (!entry || typeof entry !== "object") return entry;
    const out = JSON.parse(JSON.stringify(entry));
    const fighter = out?.data?.fighter;
    if (fighter && typeof fighter === "object") {
      out.data.fighter = normalizeAndRecalcFighter(fighter);
    }
    return out;
  }


  function weaponUpgradesText(w) {
    const ups = w?.upgrades;
    if (!ups || typeof ups !== "object") return "";
    const on = Object.entries(ups).filter(([,v]) => !!v).map(([k]) => k);
    if (!on.length) return "";
    return "Upgrades: " + on.join(", ");
  }

  function render() {
    const total = teamTotal();
    const count = team.length;
    fighterCountEl.textContent = count;
    teamTotalEl.textContent = total;

    const limit = safeNumber(limitInput.value);
    if (limit > 0) {
      const remaining = limit - total;
      limitNotice.innerHTML = remaining < 0
        ? `<span class="error">Over by ${Math.abs(remaining)} pts</span>`
        : `<span class="ok">Remaining: ${remaining} pts</span>`;
    } else {
      limitNotice.textContent = "Limit disabled (0).";
    }

    if (count === 0) {
      listEl.innerHTML = `
        <div class="fighter" style="grid-column:1/-1">
          <div class="fighterHead">
            <div class="left">
              <div class="name">No fighters loaded</div>
              <div class="meta">Use “Load Fighter JSON(s)” above.</div>
            </div>
          </div>
        </div>`;
      return;
    }

    const listItems = (arr, label, renderItem) => {
      if (!Array.isArray(arr) || arr.length === 0) {
        return `<div class="section"><h3>${label}</h3><div class="muted">None</div></div>`;
      }
      return `<div class="section"><h3>${label}</h3>${arr.map(renderItem).join("")}</div>`;
    };

    const weaponItem = (w) => {
      const profile = w?.profile ?? w?.baseProfile ?? "";
      const basePts = (w?.basePoints != null) ? `Base: ${safeNumber(w.basePoints)} pts` : "";
      const upTxt = weaponUpgradesText(w);
      const smallLines = [profile, basePts, upTxt].filter(Boolean).map(x => `<div class="small">${escapeHtml(x)}</div>`).join("");
      return `
        <div class="row">
          <div class="l">
            <b>${escapeHtml(getDisplayName(w))}</b>
            ${smallLines}
          </div>
          <div class="r">${fmtPts(w?.points ?? 0)}</div>
        </div>
      `;
    };

    const simpleItem = (it) => `
      <div class="row">
        <div class="l">
          <b>${escapeHtml(getDisplayName(it))}</b>
          ${it?.effect ? `<div class="small">${it.effect}</div>` : ""}
          ${typeof it?.cv === "number" ? `<div class="small muted">CV: ${escapeHtml(it.cv)}</div>` : ""}
        </div>
        <div class="r">${fmtPts(it?.points ?? 0)}</div>
      </div>
    `;

    listEl.innerHTML = team.map((entry) => {
      const f = entry.data.fighter;
      const totalPts = calcFighterTotal(f);
      const appName = detectGameApp(entry.data);

      const role =
        f.isMasterWarlock ? "Master Warlock" :
        (f.isWarlock ? "Warlock" : "Fighter");

      const stats = f.stats || {};
      const statKVs = [
        ["Move", stats.move],
        ["DEF", stats.def],
        ["AP", stats.ap],
        ["HP", stats.hp],
        ["ATK", stats.atk],
        ["Fight", stats.fight],
        ["Shoot", stats.shoot],
      ].map(([k,v]) => `
        <div class="kv"><div class="k">${k}</div><div class="v">${escapeHtml(v ?? "")}</div></div>
      `).join("");

      const pointsBreakdownRows = Object.entries(f.points || {}).map(([k,v]) => `
        <div class="row">
          <div class="l"><b>${escapeHtml(k)}</b></div>
          <div class="r">${fmtPts(v)}</div>
        </div>
      `).join("");

      return `
        <div class="fighter" data-id="${entry.id}">
          <div class="fighterHead">
            <div class="left">
              <div class="name">${escapeHtml(f.name)} <span class="muted" style="font-weight:700"></span></div>
              <div class="meta">Source: ${escapeHtml(entry.sourceFileName || "—")}</div>
            </div>
            <div class="right">
              <div class="fighterActionsRow">
                <div class="costTag">${fmtPts(totalPts)}</div>
                <button class="accent" data-action="card" data-id="${entry.id}">Generate Card</button>
              </div>
              <div class="fighterActionsRow">
                <button class="accent" data-action="edit" data-id="${entry.id}">Edit</button>
                <button class="accent" data-action="dup" data-id="${entry.id}">Duplicate</button>
                <button class="danger" data-action="remove" data-id="${entry.id}">Remove</button>
              </div>
            </div>
          </div>

          <details>
            <summary>Show details</summary>
            <div class="body">
              <div class="section">
                <h3>Stats</h3>
                <div class="kvs">${statKVs}</div>
              </div>

              ${listItems(f.ccWeapons, "Close Combat Weapons", weaponItem)}
              ${listItems(f.rangedWeapons, "Ranged Weapons", weaponItem)}
              ${listItems(f.abilities, "Abilities", simpleItem)}
              ${listItems(f.leaderAbilities, "Leader Abilities", simpleItem)}
              ${listItems(f.spells, "Spells", simpleItem)}
              ${listItems(f.equipment, "Equipment", simpleItem)}

              <div class="section">
                <h3>Points Breakdown</h3>
                ${pointsBreakdownRows}
                <div class="row">
                  <div class="l"><b>Total</b></div>
                  <div class="r">${fmtPts(totalPts)}</div>
                </div>
              </div>
            </div>
          </details>
        </div>
      `;
    }).join("");

    // Persist roster to this browser so the Fighter Builder can open/edit fighters.
    saveTeamStateToBrowser();
  }

  function setStatus(msg, isError=false) {
    if (!msg) { statusEl.textContent = ""; return; }
    statusEl.innerHTML = isError ? `<span class="error">${escapeHtml(msg)}</span>` : escapeHtml(msg);
  }

  async function readFileAsText(file) {
    return await new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(String(r.result || ""));
      r.onerror = () => reject(r.error || new Error("Failed reading file"));
      r.readAsText(file);
    });
  }

  async function importFighterFiles(files) {
    const arr = Array.from(files || []);
    if (arr.length === 0) return;

    let added = 0;
    let skipped = 0;

    for (const file of arr) {
      try {
        const txt = await readFileAsText(file);
        const obj = JSON.parse(txt);
        const err = validateFighterJson(obj);
        if (err) { skipped++; continue; }
                const id = uid();
        obj.fighter = normalizeAndRecalcFighter(obj.fighter);
        await ensurePortraitStoredOnFighter(obj?.fighter, id);
        team.push({ id, sourceFileName: file.name, data: obj });
        added++;
      } catch {
        skipped++;
      }
    }

    if (added) setStatus(`Loaded ${added} fighter file(s). ${skipped ? `Skipped ${skipped}.` : ""}`);
    else setStatus(`No valid fighter files found.`, true);

    // Persist roster in-browser (used by the Fighter Builder bridge)
    saveTeamStateToBrowser();

    render();
  }

  function removeFighter(id) {
    team = team.filter(x => x.id !== id);
    // Persist roster in-browser (used by the Fighter Builder bridge)
    saveTeamStateToBrowser();

    render();
  }

  function duplicateFighter(id) {
    const entry = team.find(x => x.id === id);
    if (!entry) return;
    const clone = JSON.parse(JSON.stringify(entry.data));
    clone.fighter = normalizeAndRecalcFighter(clone.fighter);
    const name = clone?.fighter?.name || "Fighter";
    clone.fighter.name = name + " (Copy)";
    team.push({ id: uid(), sourceFileName: entry.sourceFileName, data: clone });
    // Persist roster in-browser (used by the Fighter Builder bridge)
    saveTeamStateToBrowser();

    render();
  }

    async function exportTeam() {
    const exported = {
      app: "Mortalis / Dark Realms Team Builder",
      version: 1,
      savedAt: new Date().toISOString(),
      warbandName: (warbandNameEl?.value || "").trim(),
      limit: safeNumber(limitInput.value),
      fighters: []
    };

    for (const entry of team){
      const data = JSON.parse(JSON.stringify(entry.data));
      if (data?.fighter) data.fighter = normalizeAndRecalcFighter(data.fighter);
      // Re-attach portrait bytes only for exported file
      if (data?.fighter){
        await attachPortraitForExport(data.fighter);
      }
      exported.fighters.push({ sourceFileName: entry.sourceFileName || "", fighterFile: data });
    }

    const blob = new Blob([JSON.stringify(exported, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    const wb = (warbandNameEl?.value || "").trim();
    const safe = (wb ? wb : "team_roster")
      .replace(/[^a-z0-9]+/gi, "_")
      .replace(/^_+|_+$/g, "")
      .slice(0, 60);

    a.download = `${safe}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
    setStatus("Exported team_roster.json");
  }


  async function importTeamFile(file) {
    if (!file) return;
    try {
      const txt = await readFileAsText(file);
      const obj = JSON.parse(txt);
      if (!obj || typeof obj !== "object" || !Array.isArray(obj.fighters)) {
        setStatus("Not a valid team file (missing fighters array).", true);
        return;
      }

      // Restore warband name if present
      if (typeof obj.warbandName === "string" && warbandNameEl) {
        warbandNameEl.value = obj.warbandName;
        saveWarbandName(obj.warbandName);
      }

      // Restore limit if present (optional)
      if (typeof obj.limit === "number") limitInput.value = String(Math.max(0, obj.limit));

      const loaded = [];
      for (const item of obj.fighters) {
        const fighterFile = item?.fighterFile;
        const err = validateFighterJson(fighterFile);
        if (err) continue;
                const id = uid();
        fighterFile.fighter = normalizeAndRecalcFighter(fighterFile.fighter);
        await ensurePortraitStoredOnFighter(fighterFile?.fighter, id);
        loaded.push({ id, sourceFileName: item?.sourceFileName || "", data: fighterFile });
      }
      team = loaded;
      setStatus(`Imported team: ${team.length} fighter(s).`);
      // Persist roster in-browser (used by the Fighter Builder bridge)
      saveTeamStateToBrowser();

      render();
    } catch (e) {
      setStatus(`Failed importing team file: ${e?.message || e}`, true);
    }
  }

  // ---- Events ----
  fileInput.addEventListener("change", async (e) => {
    setStatus("");
    await importFighterFiles(e.target.files);
    fileInput.value = "";
  });

  teamInput.addEventListener("change", async (e) => {
    setStatus("");
    const file = e.target.files?.[0];
    await importTeamFile(file);
    teamInput.value = "";
  });

  exportBtn.addEventListener("click", async () => {
    if (team.length === 0) return setStatus("Nothing to export.", true);
    await exportTeam();
  });

  clearBtn.addEventListener("click", () => {
    team = [];
    setStatus("Cleared team.");
    // Persist roster in-browser (used by the Fighter Builder bridge)
    saveTeamStateToBrowser();

    render();
  });

  if (addFighterBtn){
    addFighterBtn.addEventListener("click", () => {
      startEditFighter(null);
    });
  }

  listEl.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-action]");
    if (!btn) return;
    const action = btn.getAttribute("data-action");
    const id = btn.getAttribute("data-id");
    if (action === "edit") startEditFighter(id);
    if (action === "card") startEditFighter(id, { autoCard: true });
    if (action === "remove") removeFighter(id);
    if (action === "dup") duplicateFighter(id);
  });

  limitInput.addEventListener("input", () => { saveTeamStateToBrowser(); render(); });

  // Warband name persistence
  if (warbandNameEl) {
    warbandNameEl.value = loadWarbandName();
    warbandNameEl.addEventListener("input", () => { saveWarbandName(warbandNameEl.value); saveTeamStateToBrowser(); });
  }

  // Try to restore an in-browser roster (used by the Fighter Builder bridge)
  loadTeamStateFromBrowser();
  // One-time migration: move any embedded portraitDataUrl into IndexedDB, then re-save a lean roster.
  migrateExistingPortraitsToIndexedDB().then(() => { saveTeamStateToBrowser(); render(); });
  return;

  render();
})();
